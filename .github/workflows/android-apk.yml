name: Android Demo Release (APK)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: android-demo-release
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java (21)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Print tool versions
        run: |
          node -v
          npm -v
          java -version

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/revolver-demo-${GITHUB_SHA::7}.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk release/revolver-demo-latest.apk

      - name: Move demo tag to this commit
        run: |
          git tag -f demo-latest
          git push -f origin demo-latest

      - name: Create/Update GitHub Release (demo-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: demo-latest
          name: "Demo (latest)"
          prerelease: true
          files: |
            release/revolver-demo-${GITHUB_SHA::7}.apk
            release/revolver-demo-latest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
